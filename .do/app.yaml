name: sigil
region: nyc

alerts:
    - rule: DEPLOYMENT_FAILED
    - rule: DOMAIN_FAILED

services:
    - name: sigil
      github:
          repo: ${GITHUB_REPO_SIGIL}
          branch: main
          deploy_on_push: true
      dockerfile_path: Dockerfile
      source_dir: /
      http_port: 8000
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-1gb
      routes:
          - path: /
      health_check:
          http_path: /health
          initial_delay_seconds: 30
          period_seconds: 10
          timeout_seconds: 5
          failure_threshold: 3
      envs:
          - key: DATABASE_URL
            scope: RUN_TIME
            value: ${sigil-db.DATABASE_URL}
          - key: CORS_ORIGINS
            scope: RUN_TIME
            value: ${APP_URL}
          - key: DOTENV_PRIVATE_KEY_PRODUCTION
            scope: RUN_TIME
            type: SECRET
            value: ${DOTENV_PRIVATE_KEY_PRODUCTION}

    - name: bifrost
      github:
          repo: ${GITHUB_REPO_BIFROST}
          branch: main
          deploy_on_push: true
      dockerfile_path: Dockerfile
      source_dir: /
      http_port: 8000
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-1gb
      routes:
          - path: /bifrost
      health_check:
          http_path: /health
          initial_delay_seconds: 10
          period_seconds: 10
          timeout_seconds: 5
          failure_threshold: 3
      envs:
          - key: NODE_ENV
            scope: RUN_TIME
            value: production
          - key: SIGIL_URL
            scope: RUN_TIME
            value: ${sigil.PRIVATE_URL}
          - key: SIGIL_API_KEY
            scope: RUN_TIME
            type: SECRET
            value: ${SIGIL_API_KEY}

databases:
    - name: sigil-db
      engine: PG
      version: "16"
      size: db-s-dev-database
      num_nodes: 1
