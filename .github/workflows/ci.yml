name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]
    workflow_call:

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            bifrost: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.bifrost == 'true' || steps.filter.outputs.heimdall == 'true' || steps.filter.outputs.mimir == 'true' }}
            norns: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.norns == 'true' }}
            mimir: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.mimir == 'true' }}
            heimdall: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.heimdall == 'true' }}
            saga: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.saga == 'true' }}
            huginn: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.huginn == 'true' || steps.filter.outputs.mimir == 'true' }}
            hermes: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.hermes == 'true' }}
            vidar: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.vidar == 'true' || steps.filter.outputs.mimir == 'true' }}
            frigg: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.frigg == 'true' }}
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: true
                  fetch-depth: 0
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      shared:
                        - '**'
                        - '!packages/**'
                        - '!services/**'
                      norns:
                        - 'packages/norns/**'
                      mimir:
                        - 'packages/mimir/**'
                      bifrost:
                        - 'services/bifrost/**'
                      heimdall:
                        - 'packages/heimdall/**'
                      saga:
                        - 'packages/saga/**'
                      huginn:
                        - 'services/huginn/**'
                      hermes:
                        - 'services/hermes/**'
                      vidar:
                        - 'services/vidar/**'
                      frigg:
                        - 'packages/frigg/**'

    norns:
        name: Norns (Lifecycle)
        needs: changes
        if: needs.changes.outputs.norns == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test build --filter=norns

    mimir:
        name: Mimir (Database)
        needs: changes
        if: needs.changes.outputs.mimir == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test build --filter=mimir

    bifrost:
        name: Bifrost (API)
        needs: changes
        if: needs.changes.outputs.bifrost == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test --filter=bifrost
            - run: pnpm turbo run build --filter=bifrost...

    hermes:
        name: Hermes (Messaging)
        needs: changes
        if: needs.changes.outputs.hermes == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test --filter=hermes
            - run: pnpm turbo run build --filter=hermes...

    frigg:
        name: Frigg (Environment)
        needs: changes
        if: needs.changes.outputs.frigg == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test --filter=frigg
            - run: pnpm turbo run build --filter=frigg...

    saga:
        name: Saga (Logging)
        needs: changes
        if: needs.changes.outputs.saga == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test build --filter=saga

    huginn:
        name: Huginn (Event Bus)
        needs: changes
        if: needs.changes.outputs.huginn == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test --filter=huginn
            - run: pnpm turbo run build --filter=huginn...

    heimdall:
        name: Heimdall (Auth)
        needs: changes
        if: needs.changes.outputs.heimdall == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test build --filter=heimdall

    vidar:
        name: Vidar (Security)
        needs: changes
        if: needs.changes.outputs.vidar == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test --filter=vidar
            - run: pnpm turbo run build --filter=vidar...
