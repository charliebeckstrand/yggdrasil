name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  bifrost:
    name: Bifrost (Gateway)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.*.changed_files.**, ','), 'services/bifrost/')
    defaults:
      run:
        working-directory: services/bifrost
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/bifrost/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  syn:
    name: Syn (Auth SDK)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.*.changed_files.**, ','), 'services/syn/')
    defaults:
      run:
        working-directory: services/syn
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/syn/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  heimdall:
    name: Heimdall (Auth)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.*.changed_files.**, ','), 'services/heimdall/')
    defaults:
      run:
        working-directory: services/heimdall
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/heimdall

      - run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings
        env:
          SQLX_OFFLINE: true

      - name: Tests
        run: cargo test
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          SECRET_KEY: ci-test-secret-key-not-used-in-production
