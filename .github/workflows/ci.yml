name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]
    workflow_call:

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            rune: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.rune == 'true' }}
            skuld: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.skuld == 'true' }}
            bifrost: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.skuld == 'true' || steps.filter.outputs.bifrost == 'true' || steps.filter.outputs.heimdall == 'true' || steps.filter.outputs.saga == 'true' || steps.filter.outputs.vidar == 'true' }}
            heimdall: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.skuld == 'true' || steps.filter.outputs.heimdall == 'true' }}
            saga: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.skuld == 'true' || steps.filter.outputs.saga == 'true' }}
            hermes: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.hermes == 'true' }}
            vidar: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.skuld == 'true' || steps.filter.outputs.vidar == 'true' || steps.filter.outputs.saga == 'true' }}
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: true
                  fetch-depth: 0
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      shared:
                        - '**'
                        - '!packages/**'
                        - '!services/**'
                      rune:
                        - 'packages/rune/**'
                      skuld:
                        - 'packages/skuld/**'
                      bifrost:
                        - 'services/bifrost/**'
                      heimdall:
                        - 'packages/heimdall/**'
                      saga:
                        - 'packages/saga/**'
                      hermes:
                        - 'services/hermes/**'
                      vidar:
                        - 'services/vidar/**'

    rune:
        name: Rune (UI)
        needs: changes
        if: needs.changes.outputs.rune == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test build --filter=rune

    skuld:
        name: Skuld (Schemas)
        needs: changes
        if: needs.changes.outputs.skuld == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test build --filter=skuld

    bifrost:
        name: Bifrost (API)
        needs: changes
        if: needs.changes.outputs.bifrost == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test --filter=bifrost
            - run: pnpm turbo run build --filter=bifrost...

    hermes:
        name: Hermes (Messaging)
        needs: changes
        if: needs.changes.outputs.hermes == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test --filter=hermes
            - run: pnpm turbo run build --filter=hermes...

    saga:
        name: Saga (Database)
        needs: changes
        if: needs.changes.outputs.saga == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test build --filter=saga

    heimdall:
        name: Heimdall (Auth)
        needs: changes
        if: needs.changes.outputs.heimdall == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test build --filter=heimdall

    vidar:
        name: Vidar (Security)
        needs: changes
        if: needs.changes.outputs.vidar == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo run lint test --filter=vidar
            - run: pnpm turbo run build --filter=vidar...
