name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      bifrost: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.bifrost == 'true' }}
      syn: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.syn == 'true' }}
      heimdall: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.heimdall == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - '**'
              - '!services/**'
            bifrost:
              - 'services/bifrost/**'
            syn:
              - 'services/syn/**'
            heimdall:
              - 'services/heimdall/**'

  bifrost:
    name: Bifrost (Gateway)
    needs: changes
    if: needs.changes.outputs.bifrost == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/bifrost
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  syn:
    name: Syn (Auth SDK)
    needs: changes
    if: needs.changes.outputs.syn == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/syn
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  heimdall:
    name: Heimdall (Auth)
    needs: changes
    if: needs.changes.outputs.heimdall == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/heimdall
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/heimdall

      - run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings
        env:
          SQLX_OFFLINE: true

      - name: Tests
        run: cargo test
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          SECRET_KEY: ci-test-secret-key-not-used-in-production
