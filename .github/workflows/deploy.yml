name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to DigitalOcean
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Resolve app spec variables
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          HEIMDALL_API_KEY: ${{ secrets.HEIMDALL_API_KEY }}
        run: |
          sed -i 's|${GITHUB_REPO}|${{ github.repository }}|g' .do/app.yaml
          pip install pyyaml -q
          python3 << 'PYEOF'
          import os, yaml

          with open('.do/app.yaml') as f:
              spec = yaml.safe_load(f)

          secrets = {
              'DATABASE_URL': os.environ['DATABASE_URL'],
              'SECRET_KEY': os.environ['SECRET_KEY'],
              'HEIMDALL_API_KEY': os.environ['HEIMDALL_API_KEY'],
          }

          for svc in spec.get('services', []):
              for env in svc.get('envs', []):
                  if env.get('key') in secrets:
                      env.pop('type', None)
                      env['value'] = secrets[env['key']]

          with open('.do/app.yaml', 'w') as f:
              yaml.dump(spec, f, default_flow_style=False, sort_keys=False)
          PYEOF

      - name: Get or create app
        id: app
        run: |
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep yggdrasil | awk '{print $1}')
          if [ -z "$APP_ID" ]; then
            echo "Creating new app..."
            APP_ID=$(doctl apps create --spec .do/app.yaml --format ID --no-header)
          else
            echo "Updating app spec..."
            doctl apps update "$APP_ID" --spec .do/app.yaml
          fi
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy app
        run: doctl apps create-deployment ${{ steps.app.outputs.app_id }} --wait
